spring:
  application:
    name: flight-agent-backend

  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY:placeholder}
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: ${OPENROUTER_MODEL:openrouter/auto}
          temperature: 0.0
          max-tokens: 2048

  datasource:
    url: jdbc:h2:mem:flightdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8000

app:
  amadeus:
    client-id: ${AMADEUS_CLIENT_ID:}
    client-secret: ${AMADEUS_CLIENT_SECRET:}
    hostname: ${AMADEUS_HOSTNAME:test}
  weather:
    api-key: ${OPENWEATHER_API_KEY:}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  agent:
    recursion-limit: ${AGENT_RECURSION_LIMIT:25}
