services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flightdb
      POSTGRES_USER: flightuser
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-flightpass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flightuser -d flightdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./springboot-backend-api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/flightdb
      DATABASE_USER: flightuser
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-flightpass}
      JPA_DDL_AUTO: update
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/auto}
      AMADEUS_CLIENT_ID: ${AMADEUS_CLIENT_ID:-}
      AMADEUS_CLIENT_SECRET: ${AMADEUS_CLIENT_SECRET:-}
      AMADEUS_HOSTNAME: ${AMADEUS_HOSTNAME:-test}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      AGENT_RECURSION_LIMIT: ${AGENT_RECURSION_LIMIT:-25}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_started
    environment:
      BACKEND_URL: http://backend:8000
      NODE_ENV: development
    ports:
      - "3000:3000"

volumes:
  postgres-data:
